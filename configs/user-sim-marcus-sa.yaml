# YAML overlay for with-user that points the user-sim at our Modal-hosted model.
#
# Usage:
#   export OPENAI_API_BASE="https://<workspace>--user-sim-marcus-sa-serve.modal.run/v1"
#   export OPENAI_API_KEY="user-sim-dev-key"
#   with-user run \
#     --benchmark swebench --harness mini-swe-agent \
#     --subset verified --split test --slice 0:5 \
#     --model openai/gpt-5 \
#     -c configs/user-sim-marcus-sa.yaml \
#     -w 5 -o runs/usersim-marcus-sa
#
# Alternatively replace the env vars by uncommenting api_base/api_key below.

agent:
  user_sim:
    model_name: "openai/user-sim"
    model_kwargs:
      # api_base: "https://<workspace>--user-sim-marcus-sa-serve.modal.run/v1"
      # api_key: "user-sim-dev-key"
      drop_params: true
      temperature: 0.7
      max_tokens: 400
    # Hard-cap how often the simulator is consulted. Default in with-user is
    # intervene_every=1 (every agent step). Our data has ~85% "continue", so
    # 1 is fine — but increase to 2 or 3 if you want a quieter user.
    intervene_every: 1
    max_interjections: 8
